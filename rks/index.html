<!doctype html>
<html>
<head>
    <meta charset="utf-8" name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
    <title>rks查询工具</title>
    <script defer="defer" src="./main.js"></script>
    <script src="./pyodide.js"></script>
    <script src="/util/ui.js"></script>
    <link href="/style/style.css" rel="stylesheet">
    <link href="/style/ui.css" rel="stylesheet">
    <link href="./main.css" rel="stylesheet">
</head>
<body><noscript><strong style="color:#f00">此浏览器不支持JavaScript，该脚本无法运行。</strong></noscript>
    <div class="index">
        <div class="main" style="display: block;">
            <div style="display: none;"><h1 class="title"></h1>
            <p class="info" style="font-size: 30px;">目前版本：3.11.0</p>
            <p class="profile">上传Phigros存档文件(com.PigeonGames.Phigros.v2.playerprefs.xml)
                <br>或包含Phigros存档文件的ab(Android Backup)文件(暂不支持加密ab)
                <br>此方法建议iOS用户使用，通过爱思助手等软件全备份后提取对应的存档文件上传</p>
            <input id="b19" type="checkbox"><label for="b19">只显示b27</label>
            <div id="uploads" class="upload"><input type="button" id="demo" value="Demo" style="display:none"> <input type="file" id="upload"> <label for="upload">上传文件</label> <input type="button" value="重置"
                    onclick="location.reload(true)"></div>
            <hr></div>
            <p class="profile">此方法建议安卓用户使用，优先选择<a href="taptap/FileReader_0.2.apk">FileReader</a>，若安装FileReader后无法授予权限，请使用<a href="getkey.ps1">PowerShell脚本</a><br>将获取到的Session Token输入到下方即可</p>
            <div id="online">
                <input id="token" placeholder="Session Token"><input type="button" value="通过token获取" id="cloud" onclick="getByToken()"></div>
            <div id="config" style="display:none"><input type="button" id="colp" value="增加列"> <input type="button" id="colm" value="减少列"></div>
            <div id="container"></div>
        </div>
    </div>
</body>
</html>

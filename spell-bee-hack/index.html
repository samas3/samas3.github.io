<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Spelling Bee Hack</title>
        <link rel="stylesheet" href="/style/style.css">
        <link rel="stylesheet" href="/style/inputbox.css">
    </head>
    <body>
        <div id="index" class="container">
            <div class="login-wrapper">
                <div class="form-wrapper">
                    <p class="header" style="font-size: 20px;">Spelling Bee Hack</p><br>
                    <input id="letters" class="input-item" placeholder="Input today's letters, center at first">
                    <input type="button" class="btn" value="Submit" onclick="view();" style="margin: 0;">
                </div>
                <textarea id="result" rows="10" cols="50" style="width: 100%; height: 40%; font: 1em sans-serif;"></textarea>
            </div>
        </div>
        <script src="./script.js"></script>
    </body>
</html>
